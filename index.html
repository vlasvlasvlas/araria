<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Araria — Spider Cursor Animation</title>
  <meta name="description" content="Araria: interactive spider animation with procedural audio">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- ══ Mode Selection Screen ══ -->
  <div id="mode-select">
    <h1 class="mode-title">🕷️ Araria</h1>
    <div class="mode-options">
      <button class="mode-btn" id="btn-ambient">
        <span class="mode-icon">🕷️</span>
        <span class="mode-label">Ambiente</span>
        <span class="mode-hint">Mover para guiar</span>
      </button>
      <button class="mode-btn" id="btn-life">
        <span class="mode-icon egg-pulse">🥚</span>
        <span class="mode-label">Vida</span>
        <span class="mode-hint">Sostener para crear</span>
      </button>
    </div>
  </div>

  <!-- ══ Ambient Controls ══ -->
  <header id="controls-bar" class="hidden">
    <div class="header-top">
      <h1 id="homeLogo" class="logo" role="button" tabindex="0" title="Volver al menú">🕷️ Araria</h1>
      <div class="header-actions">
        <button id="audioToggle" class="audio-btn" title="Audio on/off">🔇</button>
        <button id="menuToggle" class="menu-btn" title="Settings">⚙️</button>
      </div>
    </div>

    <div id="controls-wrapper" class="controls-hidden">
      <div class="controls-left">
        <div class="control-group ambient-only" title="Cantidad de arañas">
          <span class="ctrl-icon">🕸️</span>
          <input type="range" id="spiderCount" min="1" max="10" value="2">
          <span id="spiderCountVal" class="badge">2</span>
        </div>

        <div class="control-group" title="Velocidad de movimiento">
          <span class="ctrl-icon">💨</span>
          <input type="range" id="followSpeed" min="1" max="100" value="50">
          <span id="followSpeedVal" class="badge">50</span>
        </div>
      </div>

      <div class="controls-right">
        <div class="control-group" title="Volumen patas">
          <span class="ctrl-icon">🦗</span>
          <input type="range" id="insectVol" min="0" max="100" value="80">
        </div>

        <div class="control-group" title="Drone ambiental">
          <span class="ctrl-icon">🌑</span>
          <input type="range" id="droneVol" min="0" max="100" value="0">
        </div>

        <div class="control-group ambient-only" title="Textura: Sopapa ↔ Latoso">
          <span class="ctrl-icon">🧪</span>
          <input type="range" id="spiderTexture" min="0" max="100" value="75">
        </div>

        <div class="control-group" title="Ambiente (reverb + delay)">
          <span class="ctrl-icon">🌊</span>
          <input type="range" id="ambiente" min="0" max="100" value="25">
        </div>
      </div>
    </div>
  </header>

  <canvas id="canvas"></canvas>

  <script src="./audio.js"></script>
  <script src="./script.js"></script>
  <script src="./life.js"></script>
  <script src="./game.js"></script>
</body>

</html>
